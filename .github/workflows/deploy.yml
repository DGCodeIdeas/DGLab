name: CI and Deployment

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  pre-deploy-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, zip, gd
    - name: Install dependencies
      run: composer install --prefer-dist --no-progress
    - name: Run Full Health Check
      run: php cli/test.php check

  deploy:
    needs: pre-deploy-check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: FTP Deploy
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./
        server-dir: htdocs/
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/tests/**
          .env
          .env.example
          phpunit.xml
          DGLab.zip
          LICENSE
          README.md
          .gitignore
          .github/**
          docs/**
          cli/**
          composer.json
          composer.lock
          CI.log
          AGENTS.md

  render-trigger:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
    - name: Trigger Render Deploy
      run: |
        # This would use the RenderService via a small CLI script or just curl
        curl -X POST https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys \
          -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
          -H "Content-Type: application/json"
