name: Test Suite CI

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, zip, gd
    - name: Install dependencies
      run: composer install --prefer-dist --no-progress
    - name: Run Static Analysis
      run: php cli/test.php check --only-analysis

  unit-integration:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chunk: [0, 1]
    steps:
    - uses: actions/checkout@v4
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, zip, gd
    - name: Install dependencies
      run: composer install --prefer-dist --no-progress
    - name: Run Tests Chunk ${{ matrix.chunk }}
      run: |
        FILES=$(php cli/test.php split --total=2 --index=${{ matrix.chunk }})
        vendor/bin/phpunit $FILES

  browser:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, zip, gd
    - name: Install dependencies
      run: composer install --prefer-dist --no-progress
    - name: Run Browser Tests
      run: php cli/test.php run --browser
      env:
        PANTHER_NO_HEADLESS: 0
        PANTHER_CHROME_ARGUMENTS: "--headless --no-sandbox --disable-dev-shm-usage"

  health-report:
    needs: [static-analysis, unit-integration, browser]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
    - name: Install dependencies
      run: composer install --prefer-dist --no-progress
    - name: Generate Health Report
      run: php cli/test.php health
    - name: Upload Health Report
      uses: actions/upload-artifact@v4
      with:
        name: health-report
        path: storage/reports/
