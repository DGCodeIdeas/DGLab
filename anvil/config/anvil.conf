#!/usr/bin/env bash
# anvil/config/anvil.conf
#
# Bash-sourcable configuration for Anvil.
#
# Design notes:
#   * Safe to source multiple times. Every variable uses the `${VAR:-default}`
#     / `: "${VAR:=default}"` idiom so re-sourcing never clobbers a value the
#     caller (e.g. anvilctl) already exported.
#   * ANVIL_ROOT is derived from THIS file's own location when not already set,
#     so the config is usable both when sourced by anvilctl and when sourced
#     directly by a lib script.
#   * No commands with side effects are executed on source — only assignments.

# ANVIL_ROOT: the root of the Anvil installation (the anvil/ directory).
# If the caller already provided it (anvilctl exports it), keep that value.
if [[ -z "${ANVIL_ROOT:-}" ]]; then
  ANVIL_ROOT="$(dirname "$(dirname "$(readlink -f "${BASH_SOURCE[0]}")")")"
fi
export ANVIL_ROOT

# WWW_DIR: directory holding per-project web roots.
: "${WWW_DIR:=${ANVIL_ROOT}/www}"

# DOMAIN_TLD: the local development TLD served by dnsmasq (e.g. *.test).
: "${DOMAIN_TLD:=test}"

# COMPOSE_FILE: path (relative to ANVIL_ROOT) of the local docker-compose file.
: "${COMPOSE_FILE:=docker/docker-compose.local.yml}"

# INSTANCE_TYPE: default EC2 instance type for production provisioning.
# IMPORTANT (cost correction): t3.micro is the safe free-tier default.
# t3.small is NOT free-tier eligible on AWS accounts created before
# 2025-07-15 and must only be enabled by explicit user confirmation of the
# newer credit-based Free plan. Do not change this default lightly.
: "${INSTANCE_TYPE:=t3.micro}"

# ---------------------------------------------------------------------------
# Phase 4 (EC2 + RDS) configuration. All values are overridable via the
# environment so CI / the provisioning scripts can pass them in.
# ---------------------------------------------------------------------------

# EC2_COMPOSE_FILE: the Docker Compose stack used on the EC2 host (no local
# mysql — RDS is used instead). anvilctl picks this up when COMPOSE_FILE is
# exported to this path (see cloud-init.yaml / anvilctl ec2 provision).
: "${EC2_COMPOSE_FILE:=docker/docker-compose.ec2.yml}"

# Security group names (reused by name for idempotency).
: "${EC2_SG_NAME:=anvil-ec2-sg}"
: "${RDS_SG_NAME:=anvil-rds-sg}"

# VPC / networking names for idempotent reuse-by-name.
: "${ANVIL_VPC_NAME:=anvil-vpc}"
: "${ANVIL_SUBNET_NAME:=anvil-subnet}"
: "${ANVIL_IGW_NAME:=anvil-igw}"
: "${ANVIL_DB_SUBNET_GROUP:=anvil-db-subnet-group}"

# Key pair name for the EC2 instance (anvil-<env>).
: "${ANVIL_KEY_NAME:=anvil-prod}"

# Local path where the generated private key is written (chmod 600).
: "${SSH_KEY_PATH:=${ANVIL_ROOT}/anvil-ec2-key.pem}"

# Certbot / Let's Encrypt settings (used by provisioning/certbot-setup.sh).
: "${CERTBOT_DOMAINS:=}"
: "${CERTBOT_EMAIL:=}"

# AWS region (falls back to the standard AWS env vars, then us-east-1).
: "${AWS_REGION:=${AWS_DEFAULT_REGION:-us-east-1}}"

# WEB_UI_HOST / WEB_UI_PORT: bind address for the optional Web UI skin.
: "${WEB_UI_HOST:=127.0.0.1}"
: "${WEB_UI_PORT:=9999}"

# ---------------------------------------------------------------------------
# Derived, convenience variables (documented for downstream lib scripts).
# ---------------------------------------------------------------------------

# Absolute path to the resolved compose file.
: "${ANVIL_COMPOSE_FILE:=${ANVIL_ROOT}/${COMPOSE_FILE}}"

# Directory holding per-project nginx vhost configs (mounted into nginx conf.d).
: "${NGINX_CONFD_DIR:=${ANVIL_ROOT}/docker/nginx/conf.d}"

# Directory holding per-project SSL certificates issued by mkcert.
: "${CERTS_DIR:=${ANVIL_ROOT}/docker/nginx/certs}"

# Directory holding nginx vhost templates.
: "${NGINX_TEMPLATES_DIR:=${ANVIL_ROOT}/docker/nginx/templates}"

export WWW_DIR DOMAIN_TLD COMPOSE_FILE INSTANCE_TYPE WEB_UI_HOST WEB_UI_PORT
export ANVIL_COMPOSE_FILE NGINX_CONFD_DIR CERTS_DIR NGINX_TEMPLATES_DIR
export EC2_COMPOSE_FILE EC2_SG_NAME RDS_SG_NAME ANVIL_VPC_NAME ANVIL_SUBNET_NAME
export ANVIL_IGW_NAME ANVIL_DB_SUBNET_GROUP ANVIL_KEY_NAME SSH_KEY_PATH
export CERTBOT_DOMAINS CERTBOT_EMAIL AWS_REGION
