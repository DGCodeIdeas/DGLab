#!/usr/bin/env bash
# anvil/config/anvil.conf
#
# Bash-sourcable configuration for Anvil.
#
# Design notes:
#   * Safe to source multiple times. Every variable uses the `${VAR:-default}`
#     / `: "${VAR:=default}"` idiom so re-sourcing never clobbers a value the
#     caller (e.g. anvilctl) already exported.
#   * ANVIL_ROOT is derived from THIS file's own location when not already set,
#     so the config is usable both when sourced by anvilctl and when sourced
#     directly by a lib script.
#   * No commands with side effects are executed on source — only assignments.

# ANVIL_ROOT: the root of the Anvil installation (the anvil/ directory).
# If the caller already provided it (anvilctl exports it), keep that value.
if [[ -z "${ANVIL_ROOT:-}" ]]; then
  ANVIL_ROOT="$(dirname "$(dirname "$(readlink -f "${BASH_SOURCE[0]}")")")"
fi
export ANVIL_ROOT

# WWW_DIR: directory holding per-project web roots.
: "${WWW_DIR:=${ANVIL_ROOT}/www}"

# DOMAIN_TLD: the local development TLD served by dnsmasq (e.g. *.test).
: "${DOMAIN_TLD:=test}"

# COMPOSE_FILE: path (relative to ANVIL_ROOT) of the local docker-compose file.
: "${COMPOSE_FILE:=docker/docker-compose.local.yml}"

# INSTANCE_TYPE: default EC2 instance type for production provisioning.
# IMPORTANT (cost correction): t3.micro is the safe free-tier default.
# t3.small is NOT free-tier eligible on AWS accounts created before
# 2025-07-15 and must only be enabled by explicit user confirmation of the
# newer credit-based Free plan. Do not change this default lightly.
: "${INSTANCE_TYPE:=t3.micro}"

# ---------------------------------------------------------------------------
# Phase 4 (EC2 + RDS) configuration. All values are overridable via the
# environment so CI / the provisioning scripts can pass them in.
# ---------------------------------------------------------------------------

# EC2_COMPOSE_FILE: the Docker Compose stack used on the EC2 host (no local
# mysql — RDS is used instead). anvilctl picks this up when COMPOSE_FILE is
# exported to this path (see cloud-init.yaml / anvilctl ec2 provision).
: "${EC2_COMPOSE_FILE:=docker/docker-compose.ec2.yml}"

# Security group names (reused by name for idempotency).
: "${EC2_SG_NAME:=anvil-ec2-sg}"
: "${RDS_SG_NAME:=anvil-rds-sg}"

# VPC / networking names for idempotent reuse-by-name.
: "${ANVIL_VPC_NAME:=anvil-vpc}"
: "${ANVIL_SUBNET_NAME:=anvil-subnet}"
: "${ANVIL_IGW_NAME:=anvil-igw}"
: "${ANVIL_DB_SUBNET_GROUP:=anvil-db-subnet-group}"

# Key pair name for the EC2 instance (anvil-<env>).
: "${ANVIL_KEY_NAME:=anvil-prod}"

# Local path where the generated private key is written (chmod 600).
: "${SSH_KEY_PATH:=${ANVIL_ROOT}/anvil-ec2-key.pem}"

# Certbot / Let's Encrypt settings (used by provisioning/certbot-setup.sh).
: "${CERTBOT_DOMAINS:=}"
: "${CERTBOT_EMAIL:=}"

# AWS region (falls back to the standard AWS env vars, then us-east-1).
: "${AWS_REGION:=${AWS_DEFAULT_REGION:-us-east-1}}"

# URL used to detect the caller's public IP for the SSH security-group lock-down.
: "${ANVIL_IP_DETECTION_URL:=https://checkip.amazonaws.com}"

# WEB_UI_HOST / WEB_UI_PORT: bind address for the optional Web UI skin.
: "${WEB_UI_HOST:=127.0.0.1}"
: "${WEB_UI_PORT:=9999}"

# ---------------------------------------------------------------------------
# Network / VPC CIDR blocks (configurable for environments with existing
# networks or specific IP planning requirements).
# ---------------------------------------------------------------------------
: "${ANVIL_VPC_CIDR:=10.0.0.0/16}"
: "${ANVIL_PRIMARY_SUBNET_CIDR:=10.0.1.0/24}"
: "${ANVIL_SECONDARY_SUBNET_CIDR:=10.0.2.0/24}"

# ---------------------------------------------------------------------------
# RDS configuration (all overridable for different engine/version/size needs).
# ---------------------------------------------------------------------------
: "${ANVIL_RDS_ENGINE:=mysql}"
: "${ANVIL_RDS_ENGINE_VERSION:=8.0}"
: "${ANVIL_RDS_INSTANCE_CLASS:=db.t3.micro}"
: "${ANVIL_RDS_ALLOCATED_STORAGE:=20}"
: "${ANVIL_RDS_STORAGE_ENCRYPTED:=true}"
: "${ANVIL_RDS_MULTI_AZ:=false}"
: "${ANVIL_RDS_PUBLICLY_ACCESSIBLE:=false}"
: "${ANVIL_RDS_BACKUP_RETENTION:=7}"
: "${ANVIL_RDS_DB_NAME:=anvil}"
: "${ANVIL_RDS_MASTER_USERNAME_PREFIX:=anvil}"
: "${ANVIL_RDS_IDENTIFIER_PREFIX:=anvil-rds-}"

# ---------------------------------------------------------------------------
# AMI / Instance configuration
# ---------------------------------------------------------------------------
# SSM parameter for the latest Amazon Linux 2023 AMI (x86_64).
: "${ANVIL_AMI_SSM_PARAM:=/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}"

# ---------------------------------------------------------------------------
# IAM configuration (role/profile/policy names for the EC2 instance profile).
# ---------------------------------------------------------------------------
: "${ANVIL_IAM_ROLE_NAME:=anvil-ec2-role}"
: "${ANVIL_IAM_PROFILE_NAME:=anvil-ec2-profile}"
: "${ANVIL_IAM_POLICY_NAME:=anvil-ssm-read}"

# ---------------------------------------------------------------------------
# SSM Parameter Store paths for RDS credentials (SecureString).
# ---------------------------------------------------------------------------
: "${ANVIL_SSM_RDS_HOST:=/anvil/rds/host}"
: "${ANVIL_SSM_RDS_USER:=/anvil/rds/user}"
: "${ANVIL_SSM_RDS_PASSWORD:=/anvil/rds/password}"
: "${ANVIL_SSM_RDS_DATABASE:=/anvil/rds/database}"

# ---------------------------------------------------------------------------
# System paths (installer / dnsmasq / systemd-resolved / binary locations).
# ---------------------------------------------------------------------------
: "${ANVIL_DNSMASQ_CONF:=/etc/dnsmasq.d/anvil.conf}"
: "${ANVIL_RESOLVED_CONF:=/etc/systemd/resolved.conf.d/anvil.conf}"
: "${ANVIL_SYSTEMD_RESOLV_CONF:=/run/systemd/resolve/resolv.conf}"
: "${ANVIL_MKCERT_PATH:=/usr/local/bin/mkcert}"
: "${ANVIL_SASS_PATH:=/usr/local/bin/sass}"

# GitHub release API URLs for the manually-downloaded binaries (used by install.sh).
: "${ANVIL_MKCERT_GITHUB_API:=https://api.github.com/repos/FiloSottile/mkcert/releases/latest}"
: "${ANVIL_SASS_GITHUB_API:=https://api.github.com/repos/sass/dart-sass/releases/latest}"

# Fallback upstream DNS servers written into the dnsmasq config when the system
# resolver exposes none (installer).
: "${ANVIL_FALLBACK_DNS:=1.1.1.1 8.8.8.8}"

# Git repository cloned onto the EC2 host (Phase 4 cloud-init user-data).
: "${ANVIL_REPO_URL:=https://github.com/example/anvil.git}"

# Remote application directory on the EC2 host (cloud-init + RDS_ENDPOINT push).
: "${ANVIL_REMOTE_APP_DIR:=/opt/anvil}"

# SSH user for the EC2 host (ec2-user for Amazon Linux; ubuntu for Ubuntu AMIs).
: "${ANVIL_EC2_SSH_USER:=ec2-user}"

# ---------------------------------------------------------------------------
# EC2 instance tagging
# ---------------------------------------------------------------------------
: "${ANVIL_EC2_TAG_PROJECT:=anvil}"
: "${ANVIL_EC2_TAG_NAME_PREFIX:=anvil-}"

# ---------------------------------------------------------------------------
# Cloud-init user-data path (relative to ANVIL_ROOT).
# ---------------------------------------------------------------------------
: "${ANVIL_CLOUD_INIT_PATH:=provisioning/cloud-init.yaml}"

# ---------------------------------------------------------------------------
# Derived, convenience variables (documented for downstream lib scripts).
# ---------------------------------------------------------------------------

# Absolute path to the resolved compose file.
: "${ANVIL_COMPOSE_FILE:=${ANVIL_ROOT}/${COMPOSE_FILE}}"

# Directory holding per-project nginx vhost configs (mounted into nginx conf.d).
: "${NGINX_CONFD_DIR:=${ANVIL_ROOT}/docker/nginx/conf.d}"

# Directory holding per-project SSL certificates issued by mkcert.
: "${CERTS_DIR:=${ANVIL_ROOT}/docker/nginx/certs}"

# Directory holding nginx vhost templates.
: "${NGINX_TEMPLATES_DIR:=${ANVIL_ROOT}/docker/nginx/templates}"

export WWW_DIR DOMAIN_TLD COMPOSE_FILE INSTANCE_TYPE WEB_UI_HOST WEB_UI_PORT
export ANVIL_COMPOSE_FILE NGINX_CONFD_DIR CERTS_DIR NGINX_TEMPLATES_DIR
export EC2_COMPOSE_FILE EC2_SG_NAME RDS_SG_NAME ANVIL_VPC_NAME ANVIL_SUBNET_NAME
export ANVIL_IGW_NAME ANVIL_DB_SUBNET_GROUP ANVIL_KEY_NAME SSH_KEY_PATH
export CERTBOT_DOMAINS CERTBOT_EMAIL AWS_REGION ANVIL_IP_DETECTION_URL
export ANVIL_VPC_CIDR ANVIL_PRIMARY_SUBNET_CIDR ANVIL_SECONDARY_SUBNET_CIDR
export ANVIL_RDS_ENGINE ANVIL_RDS_ENGINE_VERSION ANVIL_RDS_INSTANCE_CLASS
export ANVIL_RDS_ALLOCATED_STORAGE ANVIL_RDS_STORAGE_ENCRYPTED ANVIL_RDS_MULTI_AZ
export ANVIL_RDS_PUBLICLY_ACCESSIBLE ANVIL_RDS_BACKUP_RETENTION ANVIL_RDS_DB_NAME
export ANVIL_RDS_MASTER_USERNAME_PREFIX ANVIL_RDS_IDENTIFIER_PREFIX
export ANVIL_AMI_SSM_PARAM
export ANVIL_IAM_ROLE_NAME ANVIL_IAM_PROFILE_NAME ANVIL_IAM_POLICY_NAME
export ANVIL_SSM_RDS_HOST ANVIL_SSM_RDS_USER ANVIL_SSM_RDS_PASSWORD ANVIL_SSM_RDS_DATABASE
export ANVIL_DNSMASQ_CONF ANVIL_RESOLVED_CONF ANVIL_SYSTEMD_RESOLV_CONF
export ANVIL_MKCERT_PATH ANVIL_SASS_PATH ANVIL_MKCERT_GITHUB_API ANVIL_SASS_GITHUB_API
export ANVIL_FALLBACK_DNS ANVIL_REPO_URL ANVIL_REMOTE_APP_DIR ANVIL_EC2_SSH_USER
export ANVIL_EC2_TAG_PROJECT ANVIL_EC2_TAG_NAME_PREFIX
export ANVIL_CLOUD_INIT_PATH
